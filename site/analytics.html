<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics · limitedenergy.net</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-deep:  #0E1B30; --navy-mid:   #162338; --navy-light: #1E3260;
      --red:        #C8102E; --red-dim:    #a00d24;
      --text:       #EDF1F8; --text-muted: #B8C5D8; --text-dim:   #6B7C95;
      --border:     #1E3260; --border-dim: #162338;
      --green:      #2ecc71; --yellow:     #f1c40f;
      --font-head:  'Oswald', sans-serif; --font-body: 'Barlow', sans-serif; --font-mono: 'Space Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--navy-deep); color:var(--text); font-family:var(--font-body); font-size:16px; line-height:1.6; min-height:100vh; }
    nav { position:sticky; top:0; z-index:200; background:var(--navy-deep); border-bottom:1px solid var(--border-dim); display:flex; justify-content:space-between; align-items:center; padding:0 2.5rem; height:64px; }
    .nav-brand { display:flex; align-items:baseline; gap:0.75rem; text-decoration:none; }
    .nav-brand .lex { font-family:var(--font-head); font-weight:700; font-size:1.5rem; letter-spacing:0.2em; color:var(--red); }
    .nav-brand .tagline { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; }
    .nav-back { font-family:var(--font-head); font-size:0.8rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; }
    .nav-back:hover { color:var(--red); }
    #gate { position:fixed; inset:0; z-index:999; background:var(--navy-deep); display:flex; align-items:center; justify-content:center; }
    .gate-box { background:var(--navy-mid); border:1px solid var(--border); padding:2.5rem; width:340px; text-align:center; }
    .gate-box h2 { font-family:var(--font-head); font-size:1.4rem; letter-spacing:0.15em; color:var(--red); margin-bottom:0.5rem; }
    .gate-box p { font-size:0.85rem; color:var(--text-dim); margin-bottom:1.5rem; }
    .gate-box input { width:100%; background:var(--navy-deep); border:1px solid var(--border); color:var(--text); font-family:var(--font-mono); font-size:0.9rem; padding:0.6rem 0.8rem; margin-bottom:0.75rem; outline:none; }
    .gate-box input:focus { border-color:var(--red); }
    .gate-box button { width:100%; background:var(--red); color:#fff; border:none; font-family:var(--font-head); font-size:0.9rem; letter-spacing:0.15em; text-transform:uppercase; padding:0.65rem; cursor:pointer; }
    .gate-box button:hover { background:var(--red-dim); }
    .gate-error { font-size:0.8rem; color:var(--red); margin-top:0.5rem; min-height:1.2em; }
    main { max-width:1000px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .page-header { margin-bottom:2rem; border-bottom:1px solid var(--border-dim); padding-bottom:1rem; }
    .page-header h1 { font-family:var(--font-head); font-size:1.6rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; }
    .page-header .sub { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-dim); margin-top:0.25rem; }
    .section { margin-bottom:2.5rem; }
    .section-title { font-family:var(--font-head); font-size:0.8rem; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); border-bottom:1px solid var(--border-dim); padding-bottom:0.4rem; margin-bottom:1rem; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; }
    .card { background:var(--navy-mid); border:1px solid var(--border-dim); padding:1.25rem; }
    .card-label { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); margin-bottom:0.4rem; }
    .card-value { font-family:var(--font-head); font-size:2rem; font-weight:600; color:var(--text); }
    .card-note { font-size:0.78rem; color:var(--text-dim); margin-top:0.25rem; }
    .card-value.green { color:var(--green); }
    .card-value.red { color:var(--red); }
    .chart-wrap { background:var(--navy-mid); border:1px solid var(--border-dim); padding:1.25rem; }
    .chart-bars { display:flex; align-items:flex-end; gap:6px; height:120px; margin-bottom:0.5rem; }
    .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
    .bar { width:100%; background:var(--navy-light); transition:background 0.2s; }
    .bar.peak { background:var(--red); }
    .bar:hover { background:var(--red-dim); }
    .bar-label { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); }
    .bar-val { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-muted); }
    table { width:100%; border-collapse:collapse; font-size:0.875rem; }
    thead tr { border-bottom:1px solid var(--border); }
    th { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); padding:0.5rem 0.75rem; text-align:left; font-weight:400; }
    td { padding:0.6rem 0.75rem; color:var(--text-muted); border-bottom:1px solid var(--border-dim); font-family:var(--font-mono); font-size:0.8rem; }
    tr:last-child td { border-bottom:none; }
    td.primary { color:var(--text); }
    .share-bar { height:6px; background:var(--red); display:inline-block; }
    .insight { background:var(--navy-mid); border-left:3px solid var(--red); padding:0.85rem 1rem; margin-bottom:0.75rem; font-size:0.875rem; color:var(--text-muted); }
    .insight strong { color:var(--text); }
  </style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>LEX ANALYTICS</h2>
    <p>Private dashboard — limitedenergy.net</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button onclick="checkGate()">ENTER</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<nav>
  <a class="nav-brand" href="/"><span class="lex">LEX</span><span class="tagline">Limited Energy eXperts</span></a>
  <a class="nav-back" href="/">← Home</a>
</nav>

<main>
  <div class="page-header">
    <h1>Netlify Analytics</h1>
    <div class="sub" id="page-sub">Loading…</div>
  </div>
  <div class="section">
    <div class="section-title">Live Project Status</div>
    <div class="cards" id="live-status"></div>
  </div>
  <div class="section">
    <div class="section-title" id="traffic-title">7-Day Traffic</div>
    <div class="cards" id="traffic"></div>
  </div>
  <div class="section">
    <div class="section-title">Pageviews by Day</div>
    <div class="chart-wrap"><div class="chart-bars" id="chart"></div></div>
  </div>
  <div class="section">
    <div class="section-title">Top Pages</div>
    <table>
      <thead><tr><th>Page</th><th>Pageviews</th><th>Share</th></tr></thead>
      <tbody id="pages-tbody"></tbody>
    </table>
    <div style="margin-top:0.75rem" class="insight" id="page-insight"></div>
  </div>
  <div class="section">
    <div class="section-title">Top Sources</div>
    <table>
      <thead><tr><th>Source</th><th>Referrals</th><th>Note</th></tr></thead>
      <tbody id="sources-tbody"></tbody>
    </table>
  </div>
  <div class="section">
    <div class="section-title">Geography</div>
    <table>
      <thead><tr><th>Country</th><th>Pageviews</th><th>Share</th><th>Note</th></tr></thead>
      <tbody id="geo-tbody"></tbody>
    </table>
    <div style="margin-top:0.75rem" class="insight" id="geo-insight"></div>
  </div>
  <div class="section">
    <div class="section-title">Outstanding Items</div>
    <div id="outstanding"></div>
  </div>
</main>


<script>
  const PW = 'LEX2026';
  const SESSION_KEY = 'lex_analytics_auth';
  const COLOR_VAR = { red: 'var(--red)', green: 'var(--green)', yellow: 'var(--yellow)' };

  function checkGate() {
    if (document.getElementById('pw-input').value === PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('gate').style.display = 'none';
    } else {
      document.getElementById('gate-error').textContent = 'Incorrect password.';
    }
  }
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate(); });
  if (sessionStorage.getItem(SESSION_KEY) === '1') document.getElementById('gate').style.display = 'none';

  function render(d) {
    document.getElementById('page-sub').textContent =
      `limitedenergy.net · 7-day snapshot · window: ${d.meta.windowFrom} → ${d.meta.windowTo} · refreshed ${d.meta.refreshed}`;
    document.getElementById('traffic-title').textContent =
      `7-Day Traffic — ${d.meta.windowFrom} to ${d.meta.windowTo}`;

    document.getElementById('live-status').innerHTML = d.liveStatus.map(c => `
      <div class="card">
        <div class="card-label">${c.label}</div>
        <div class="card-value ${c.valueClass||''}" style="${c.valueStyle||''}">${c.value}</div>
        <div class="card-note">${c.note}</div>
      </div>`).join('');

    document.getElementById('traffic').innerHTML = d.traffic.map(c => `
      <div class="card">
        <div class="card-label">${c.label}</div>
        <div class="card-value ${c.valueClass||''}">${c.value}</div>
        <div class="card-note">${c.note}</div>
      </div>`).join('');

    const max = Math.max(...d.dailyChart.map(x => x.val));
    document.getElementById('chart').innerHTML = d.dailyChart.map(x => `
      <div class="bar-col">
        <span class="bar-val">${x.val}</span>
        <div class="bar${x.peak ? ' peak' : ''}" style="height:${Math.round(x.val/max*100)}%"></div>
        <span class="bar-label">${x.day}</span>
      </div>`).join('');

    document.getElementById('pages-tbody').innerHTML = d.topPages.map(p => {
      const bar = p.shareWidth > 0
        ? `<span class="share-bar" style="width:${p.shareWidth}px;background:${COLOR_VAR[p.shareColor]||COLOR_VAR.red}"></span> ` : '';
      return `<tr><td class="primary">${p.page}</td><td>${p.views}</td><td>${bar}${p.share}</td></tr>`;
    }).join('');
    document.getElementById('page-insight').textContent = d.pageInsight;

    document.getElementById('sources-tbody').innerHTML = d.topSources.map(s =>
      `<tr><td class="primary">${s.source}</td><td>${s.referrals}</td><td>${s.note}</td></tr>`
    ).join('');

    document.getElementById('geo-tbody').innerHTML = d.geography.map(g =>
      `<tr><td class="primary">${g.country}</td><td>${g.views}</td><td>${g.share}</td><td style="color:var(--text-dim)">${g.note}</td></tr>`
    ).join('');
    document.getElementById('geo-insight').innerHTML = d.geoInsight;

    document.getElementById('outstanding').innerHTML = d.outstanding.map(o =>
      `<div class="insight" style="border-left-color:${COLOR_VAR[o.color]||COLOR_VAR.red}">${o.text}</div>`
    ).join('');
  }

  fetch('/data/analytics-data.json')
    .then(r => r.json())
    .then(render)
    .catch(err => { document.getElementById('page-sub').textContent = 'Error loading data: ' + err.message; });
</script>
</body>
</html>
